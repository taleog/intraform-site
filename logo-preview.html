<!DOCTYPE html>
<html><head><style>
  body { background: #030303; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 48px; padding: 40px; margin: 0; color: #f7f7f2; font-family: system-ui; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.4; font-weight: 400; margin: 0 0 12px; }
  .section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .row { display: flex; align-items: center; gap: 64px; flex-wrap: wrap; justify-content: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .invert { background: #f7f7f2; padding: 48px 64px; border-radius: 6px; }
  .invert h2 { color: #030303; }
  svg { display: block; }
</style></head><body>

<div class="section">
  <h2>logo — light background</h2>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120" fill="none" style="color:#f7f7f2">
    <defs><style>@import url('https://fonts.googleapis.com/css2?family=Geist:wght@500;600&amp;display=swap');
      .i{font-family:'Geist',system-ui,sans-serif;font-weight:600;font-size:52px;letter-spacing:-0.03em}
      .f{font-family:'Geist',system-ui,sans-serif;font-weight:500;font-size:52px;letter-spacing:-0.03em}
    </style></defs>
    <g transform="translate(4,12)">
      <rect x="4" y="0" width="10" height="92" rx="2" fill="currentColor"/>
      <rect x="22" y="18" width="10" height="74" rx="2" fill="currentColor" opacity="0.35"/>
      <rect x="40" y="36" width="10" height="56" rx="2" fill="currentColor" opacity="0.12"/>
      <circle cx="9" cy="0" r="5" fill="currentColor"/>
      <circle cx="27" cy="18" r="4" fill="currentColor" opacity="0.35"/>
      <circle cx="45" cy="36" r="3" fill="currentColor" opacity="0.12"/>
    </g>
    <text x="76" y="82" class="i" fill="currentColor">intra</text>
    <text x="208" y="82" class="f" fill="currentColor" opacity="0.50">form</text>
  </svg>
</div>

<div class="section invert">
  <h2>logo — dark background</h2>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120" fill="none" style="color:#030303">
    <defs><style>@import url('https://fonts.googleapis.com/css2?family=Geist:wght@500;600&amp;display=swap');
      .i{font-family:'Geist',system-ui,sans-serif;font-weight:600;font-size:52px;letter-spacing:-0.03em}
      .f{font-family:'Geist',system-ui,sans-serif;font-weight:500;font-size:52px;letter-spacing:-0.03em}
    </style></defs>
    <g transform="translate(4,12)">
      <rect x="4" y="0" width="10" height="92" rx="2" fill="currentColor"/>
      <rect x="22" y="18" width="10" height="74" rx="2" fill="currentColor" opacity="0.35"/>
      <rect x="40" y="36" width="10" height="56" rx="2" fill="currentColor" opacity="0.12"/>
      <circle cx="9" cy="0" r="5" fill="currentColor"/>
      <circle cx="27" cy="18" r="4" fill="currentColor" opacity="0.35"/>
      <circle cx="45" cy="36" r="3" fill="currentColor" opacity="0.12"/>
    </g>
    <text x="76" y="82" class="i" fill="currentColor">intra</text>
    <text x="208" y="82" class="f" fill="currentColor" opacity="0.50">form</text>
  </svg>
</div>

<h2 style="margin-top:16px">icon at various sizes</h2>
<div class="row">
  <div class="col">

      <rect x="6" y="2" width="10" height="56" rx="2.5" fill="currentColor"/>
      <rect x="22" y="14" width="10" height="44" rx="2.5" fill="currentColor" opacity="0.40"/>
      <rect x="38" y="26" width="10" height="32" rx="2.5" fill="currentColor" opacity="0.15"/>
      <circle cx="11" cy="2" r="5" fill="currentColor"/>
      <circle cx="27" cy="14" r="4" fill="currentColor" opacity="0.40"/>
      <circle cx="43" cy="26" r="3" fill="currentColor" opacity="0.15"/>
    </svg>
    <span style="font-size:11px;opacity:0.4">64px</span>
  </div>
  <div class="col">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32" fill="none" style="color:#f7f7f2">
      <rect x="6" y="2" width="10" height="56" rx="2.5" fill="currentColor"/>
      <rect x="22" y="14" width="10" height="44" rx="2.5" fill="currentColor" opacity="0.40"/>
      <rect x="38" y="26" width="10" height="32" rx="2.5" fill="currentColor" opacity="0.15"/>
      <circle cx="11" cy="2" r="5" fill="currentColor"/>
      <circle cx="27" cy="14" r="4" fill="currentColor" opacity="0.40"/>
      <circle cx="43" cy="26" r="3" fill="currentColor" opacity="0.15"/>
    </svg>
    <span style="font-size:11px;opacity:0.4">32px</span>
  </div>
  <div class="col">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="16" height="16" fill="none" style="color:#f7f7f2">
      <rect x="6" y="2" width="10" height="56" rx="2.5" fill="currentColor"/>
      <rect x="22" y="14" width="10" height="44" rx="2.5" fill="currentColor" opacity="0.40"/>
      <rect x="38" y="26" width="10" height="32" rx="2.5" fill="currentColor" opacity="0.15"/>
      <circle cx="11" cy="2" r="5" fill="currentColor"/>
      <circle cx="27" cy="14" r="4" fill="currentColor" opacity="0.40"/>
      <circle cx="43" cy="26" r="3" fill="currentColor" opacity="0.15"/>
    </svg>
    <span style="font-size:11px;opacity:0.4">16px</span>
  </div>
</div>

<div class="section" style="margin-top:16px">
  <h2>nav usage mockup</h2>
  <div style="display:flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid rgba(247,247,242,0.12);border-radius:4px">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="22" height="22" fill="none" style="color:#f7f7f2">
      <rect x="6" y="2" width="8" height="56" rx="2" fill="currentColor"/>
      <rect x="20" y="16" width="8" height="42" rx="2" fill="currentColor" opacity="0.35"/>
      <rect x="34" y="30" width="8" height="28" rx="2" fill="currentColor" opacity="0.12"/>
      <circle cx="10" cy="2" r="4" fill="currentColor"/>
      <circle cx="24" cy="16" r="3.2" fill="currentColor" opacity="0.35"/>
      <circle cx="38" cy="30" r="2.5" fill="currentColor" opacity="0.12"/>
    </svg>
    <span style="font-size:16px;font-weight:500;letter-spacing:-0.02em">intraform</span>
  </div>
</div>

</body></html>
